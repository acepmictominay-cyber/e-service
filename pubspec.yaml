    - assets/logo/logo_nobg.png
    - assets/image/logo.png
    - assets/image/google.png
    - assets/image/coin.png
    - assets/image/promo.png
    - assets/image/mouse1.jpeg
    - assets/image/mouse2.jpeg
    - assets/image/mouse3.jpeg
    - assets/image/mouse4.jpeg
    - assets/image/asus_logo.png
    - assets/image/produk.jpg
    - assets/image/service_image.jpeg
    - assets/image/banner/garansi.jpg
    - assets/image/banner/kebersihan.jpg
    - assets/image/banner/tips.png
    - assets/image/banner/points.png
    - assets/logo/point.png
    - assets/image/bronze.jpeg
    - assets/image/silver.jpeg
    - assets/image/gold.jpeg
    - assets/image/diamond.jpeg
    - assets/image/asus_logo.png
    - assets/image/advan_logo.png
    - assets/image/msi_logo.png
    - assets/image/canon_logo.png
    - assets/image/lenovo_logo.png
    - assets/image/axioo_logo.png
    - assets/image/epson_logo.png
